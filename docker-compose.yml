networks:
  shoptrace-net:
    driver: bridge

volumes:
  postgres-data:


services:

  postgres:
    image: postgres:15-alpine
    container_name: shoptrace-postgres
    environment:
      POSTGRES_USER: shoptrace
      POSTGRES_PASSWORD: shoptrace123
      POSTGRES_DB: shoptrace
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - shoptrace-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shoptrace" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # ✅ THIS WAS MISSING
    build: .
    container_name: shoptrace-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      SERVICE_NAME: shoptrace-simple

      # ✅ OTEL CONFIG — SigNoz Cloud
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: shoptrace-simple
      OTEL_LOG_LEVEL: info
      SIGNOZ_INGESTION_KEY: rSIDSZ7tzIjUmGgXBnefO9Bzi-pnmA7AWrT-

      DATABASE_URL: postgres://shoptrace:shoptrace123@postgres:5432/shoptrace

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shoptrace-net
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: shoptrace-otel
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"
      - "4317:4317"
    networks:
      - shoptrace-net
