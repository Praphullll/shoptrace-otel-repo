<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ShopTrace – Premium gadgets marketplace with real-time order tracking." />
  <meta name="theme-color" content="#0a0b0e" />
  <title>ShopTrace | Gadgets Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- SPA root – content rendered by JavaScript -->
    <div id="loading-screen" style="
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      background:#0a0b0e;
      color:#e8eaf0;
      font-family:'Inter',sans-serif;
      flex-direction:column;
      gap:16px;
    ">
      <div style="
        width:40px;height:40px;
        border:3px solid #2a2d36;
        border-top-color:#4f8ef7;
        border-radius:50%;
        animation:spin 0.8s linear infinite;
      "></div>
      <p style="font-size:14px;color:#8b8fa8;">Loading ShopTrace…</p>
    </div>
  </div>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
